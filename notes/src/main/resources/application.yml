spring:
  application:
    name: notes-backend

  jackson:
    serialization:
      write-dates-as-timestamps: false

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    root: INFO
    org.springframework: INFO
