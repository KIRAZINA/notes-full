spring:
  application:
    name: notes-backend

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:SET_JWT_SECRET_IN_ENVIRONMENT_MIN_32_CHARS}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    root: INFO
    org.springframework: INFO
